name: HTML Portfolio CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run HTML Portfolio Check
        uses: ./.github/actions/html-check
        with:
          project_name: "Chanuki Portfolio"

      - name: Check HTML files exist
        run: |
          if ls *.html 1> /dev/null 2>&1; then
            echo " HTML files found:"
            ls -la *.html
          else
            echo " No HTML files yet — will be added in next push"
          fi

      - name: Check CSS file exists
        run: |
          if ls *.css 1> /dev/null 2>&1; then
            echo " CSS files found"
            ls -la *.css
          else
            echo " No CSS files yet"
          fi

      - name: Check JS file exists
        run: |
          if ls *.js 1> /dev/null 2>&1; then
            echo " JS files found"
            ls -la *.js
          else
            echo " No JS files yet"
          fi